# Produktions-Deployment mit externem Traefik als Reverse Proxy
#
# Voraussetzungen:
#   - Traefik läuft extern im Docker-Netzwerk "proxy"
#
# Benötigte Umgebungsvariablen (in .env):
#   DOMAIN=foerderverein.example.de
#   POSTGRES_PASSWORD=sicheres_passwort
#   JWT_SECRET=sicherer_zufallsstring
#
# Starten: docker compose -f docker-compose.prod.yml up -d

version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: foerderverein-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foerderverein}
      POSTGRES_USER: ${POSTGRES_USER:-fvuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Kein Port-Mapping – DB nur intern erreichbar
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fvuser} -d ${POSTGRES_DB:-foerderverein}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foerderverein-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-fvuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-foerderverein}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@foerderverein.de}
      CORS_ORIGIN: https://${DOMAIN}
      UPLOAD_DIR: /app/uploads
      PORT: 4000
    volumes:
      - ./uploads:/app/uploads
    # Kein Port-Mapping – Backend nur intern erreichbar
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foerderverein-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.foerderverein.entrypoints=http"
      - "traefik.http.routers.foerderverein.rule=Host(`${DOMAIN}`)"
      - "traefik.http.middlewares.foerderverein-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.foerderverein.middlewares=foerderverein-https-redirect"
      - "traefik.http.routers.foerderverein-secure.entrypoints=https"
      - "traefik.http.routers.foerderverein-secure.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.foerderverein-secure.tls=true"
      - "traefik.http.routers.foerderverein-secure.tls.certresolver=http"
      - "traefik.http.routers.foerderverein-secure.service=foerderverein"
      - "traefik.http.services.foerderverein.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
  internal:
    name: foerderverein-internal
    internal: true   # kein Internetzugang für DB und Backend
